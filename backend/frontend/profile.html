<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile Setup</title>
    <link rel="stylesheet" href="/frontend/style.css" />
    <style>
      .wizard-steps {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .step-chip {
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        color: var(--muted);
        font-weight: 700;
        font-size: 12px;
        padding: 6px 10px;
      }
      .step-chip.active {
        background: var(--primary-soft);
        color: var(--text);
        border-color: color-mix(in srgb, var(--primary) 48%, var(--border));
      }
      .choice-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      }
      .choice-btn {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        text-align: left;
        font-weight: 700;
      }
      .choice-btn.active {
        border-color: var(--primary);
        box-shadow: var(--ring);
      }
      .body-shape-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      }
      .body-shape-btn {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        padding: 10px;
        display: grid;
        justify-items: center;
        gap: 8px;
      }
      .body-shape-btn svg {
        width: 56px;
        height: 86px;
      }
      .body-shape-btn.active {
        border-color: var(--primary);
        box-shadow: var(--ring);
      }
      .skin-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }
      .skin-btn {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        padding: 10px;
        text-align: left;
      }
      .skin-chip {
        height: 28px;
        border-radius: 8px;
        border: 1px solid color-mix(in srgb, var(--border) 70%, #fff);
        margin-bottom: 8px;
      }
      .skin-btn.active {
        border-color: var(--primary);
        box-shadow: var(--ring);
      }
      .wizard-footer {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }
    </style>
  </head>
  <body class="app-shell">
    <main class="page">
      <header class="page-header">
        <div>
          <h1 class="page-title">Profile Setup</h1>
          <p class="page-subtitle">Optional inputs. Skip any step you do not want to fill.</p>
        </div>
      </header>

      <section class="panel">
        <div class="wizard-steps">
          <span class="step-chip active" data-step-chip="0">1. Basics</span>
          <span class="step-chip" data-step-chip="1">2. Fit</span>
          <span class="step-chip" data-step-chip="2">3. Skin Tone</span>
          <span class="step-chip" data-step-chip="3">4. Review</span>
        </div>
      </section>

      <section class="panel">
        <div id="errorBox" class="error hidden"></div>
        <div id="step0">
          <h2 style="margin-top:0;">Basic Details</h2>
          <div class="field-grid">
            <label>User Name <input id="userName" type="text" maxlength="80" /></label>
            <label>Age <input id="age" type="number" min="10" max="100" /></label>
            <label>Height (cm) <input id="height" type="number" min="50" max="250" /></label>
            <label>Weight (kg) <input id="weight" type="number" min="20" max="400" /></label>
          </div>
          <label style="margin-top:10px;">Sex
            <select id="sex">
              <option value="">Prefer not to say</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
              <option value="prefer_not_to_say">Prefer not to say</option>
            </select>
          </label>
        </div>

        <div id="step1" class="hidden">
          <h2 style="margin-top:0;">Body Shape & Fit</h2>
          <div class="muted small">Pick the closest option or skip.</div>
          <div style="margin-top:10px;">
            <div class="muted small">Body Shape</div>
            <div id="bodyShapeGrid" class="body-shape-grid"></div>
          </div>
          <div style="margin-top:12px;">
            <div class="muted small">Fit Preference</div>
            <div id="fitGrid" class="choice-grid"></div>
          </div>
        </div>

        <div id="step2" class="hidden">
          <h2 style="margin-top:0;">Skin Tone</h2>
          <div id="skinGrid" class="skin-grid"></div>
        </div>

        <div id="step3" class="hidden">
          <h2 style="margin-top:0;">Review</h2>
          <div id="reviewBox" class="summary"></div>
        </div>

        <div class="wizard-footer">
          <button id="backBtn" class="btn secondary" type="button">Back</button>
          <button id="nextBtn" class="btn secondary" type="button">Next</button>
          <button id="skipBtn" class="btn ghost" type="button">Skip This Step</button>
          <button id="saveBtn" class="btn" type="button">Save Profile</button>
        </div>
      </section>
    </main>

    <script src="/frontend/app.js?v=10"></script>
    <script>
      const bodyShapes = [
        { value: "slim", label: "Slim" },
        { value: "average", label: "Average" },
        { value: "athletic", label: "Athletic" },
        { value: "broad", label: "Broad" },
        { value: "rectangle", label: "Rectangle" },
        { value: "triangle", label: "Triangle" },
        { value: "inverted_triangle", label: "Inverted Triangle" },
        { value: "oval", label: "Rounded/Oval" },
      ];
      const fitPrefs = ["slim", "regular", "loose"];
      const skinTones = [
        { value: "very_fair", label: "Very Fair", hex: "#f7e6d4" },
        { value: "fair", label: "Fair", hex: "#efcfb0" },
        { value: "medium", label: "Medium", hex: "#d6a47c" },
        { value: "olive", label: "Olive", hex: "#b28f66" },
        { value: "brown", label: "Brown", hex: "#8b5d3b" },
        { value: "dark", label: "Dark", hex: "#5a3a2a" },
      ];

      const errorBox = document.getElementById("errorBox");
      const userName = document.getElementById("userName");
      const age = document.getElementById("age");
      const height = document.getElementById("height");
      const weight = document.getElementById("weight");
      const sex = document.getElementById("sex");
      const backBtn = document.getElementById("backBtn");
      const nextBtn = document.getElementById("nextBtn");
      const skipBtn = document.getElementById("skipBtn");
      const saveBtn = document.getElementById("saveBtn");
      const reviewBox = document.getElementById("reviewBox");

      const selected = {
        body_shape: null,
        fit_preference: null,
        skin_tone: null,
      };

      let step = 0;
      let currentProfile = null;

      function setError(msg) {
        errorBox.textContent = msg || "";
        errorBox.classList.toggle("hidden", !msg);
      }

      function bodyShapeSvg(shape) {
        const fill = "currentColor";
        if (shape === "triangle") return `<svg viewBox="0 0 80 120" aria-hidden="true"><path fill="${fill}" d="M40 11c-9 0-15 6-15 16 0 7 4 13 15 13s15-6 15-13c0-10-6-16-15-16Zm-18 35h36l16 58H6l16-58Z"/></svg>`;
        if (shape === "inverted_triangle") return `<svg viewBox="0 0 80 120" aria-hidden="true"><path fill="${fill}" d="M40 11c-9 0-15 6-15 16 0 7 4 13 15 13s15-6 15-13c0-10-6-16-15-16Zm-28 35h56L56 78H24L12 46Zm14 32h28l-4 29H30l-4-29Z"/></svg>`;
        if (shape === "rectangle") return `<svg viewBox="0 0 80 120" aria-hidden="true"><path fill="${fill}" d="M40 11c-9 0-15 6-15 16 0 7 4 13 15 13s15-6 15-13c0-10-6-16-15-16Zm-20 35h40v62H20V46Z"/></svg>`;
        if (shape === "oval") return `<svg viewBox="0 0 80 120" aria-hidden="true"><path fill="${fill}" d="M40 11c-9 0-15 6-15 16 0 7 4 13 15 13s15-6 15-13c0-10-6-16-15-16Zm0 34c16 0 26 13 26 31s-10 31-26 31S14 94 14 76s10-31 26-31Z"/></svg>`;
        if (shape === "slim") return `<svg viewBox="0 0 80 120" aria-hidden="true"><path fill="${fill}" d="M40 11c-8 0-13 6-13 15 0 8 4 14 13 14s13-6 13-14c0-9-5-15-13-15Zm-13 35h26v62H27V46Z"/></svg>`;
        if (shape === "broad") return `<svg viewBox="0 0 80 120" aria-hidden="true"><path fill="${fill}" d="M40 11c-10 0-16 6-16 15 0 9 6 14 16 14s16-5 16-14c0-9-6-15-16-15Zm-23 35h46v62H17V46Z"/></svg>`;
        if (shape === "athletic") return `<svg viewBox="0 0 80 120" aria-hidden="true"><path fill="${fill}" d="M40 11c-9 0-14 6-14 15 0 8 5 14 14 14s14-6 14-14c0-9-5-15-14-15Zm-21 35h42l-8 28H27l-8-28Zm8 29h26l-4 33H31l-4-33Z"/></svg>`;
        return `<svg viewBox="0 0 80 120" aria-hidden="true"><path fill="${fill}" d="M40 11c-9 0-14 6-14 15 0 8 5 14 14 14s14-6 14-14c0-9-5-15-14-15Zm-18 35h36v62H22V46Z"/></svg>`;
      }

      function renderBodyShapeGrid() {
        const container = document.getElementById("bodyShapeGrid");
        container.innerHTML = "";
        bodyShapes.forEach((shape) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "body-shape-btn";
          btn.classList.toggle("active", selected.body_shape === shape.value);
          btn.innerHTML = `${bodyShapeSvg(shape.value)}<span>${shape.label}</span>`;
          btn.addEventListener("click", () => {
            selected.body_shape = shape.value;
            renderBodyShapeGrid();
          });
          container.appendChild(btn);
        });
      }

      function renderFitGrid() {
        const container = document.getElementById("fitGrid");
        container.innerHTML = "";
        fitPrefs.forEach((value) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "choice-btn";
          btn.textContent = value.replace(/_/g, " ");
          btn.classList.toggle("active", selected.fit_preference === value);
          btn.addEventListener("click", () => {
            selected.fit_preference = value;
            renderFitGrid();
          });
          container.appendChild(btn);
        });
      }

      function renderSkinGrid() {
        const container = document.getElementById("skinGrid");
        container.innerHTML = "";
        skinTones.forEach((tone) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "skin-btn";
          btn.classList.toggle("active", selected.skin_tone === tone.value);
          btn.innerHTML = `<div class="skin-chip" style="background:${tone.hex};"></div><div>${tone.label}</div>`;
          btn.addEventListener("click", () => {
            selected.skin_tone = tone.value;
            renderSkinGrid();
          });
          container.appendChild(btn);
        });
      }

      function updateStepUi() {
        [0, 1, 2, 3].forEach((idx) => {
          document.getElementById(`step${idx}`).classList.toggle("hidden", idx !== step);
          const chip = document.querySelector(`[data-step-chip="${idx}"]`);
          if (chip) chip.classList.toggle("active", idx === step);
        });
        backBtn.disabled = step === 0;
        nextBtn.disabled = step === 3;
        if (step === 3) renderReview();
      }

      function renderReview() {
        const draft = buildDraftPayload(false);
        reviewBox.innerHTML = `
          <div><strong>Name:</strong> ${draft.user_name || "-"}</div>
          <div><strong>Age:</strong> ${draft.age ?? "-"}</div>
          <div><strong>Sex:</strong> ${draft.sex || "-"}</div>
          <div><strong>Body shape:</strong> ${draft.body_shape || "-"}</div>
          <div><strong>Fit preference:</strong> ${draft.fit_preference || "-"}</div>
          <div><strong>Height:</strong> ${draft.height_cm ?? "-"}</div>
          <div><strong>Weight:</strong> ${draft.weight_kg ?? "-"}</div>
          <div><strong>Skin tone:</strong> ${draft.skin_tone || "-"}</div>
        `;
      }

      function buildDraftPayload(includeNulls) {
        const payload = {};
        const name = userName.value.trim();
        if (name || includeNulls) payload.user_name = name || null;
        if (age.value.trim() || includeNulls) payload.age = age.value.trim() ? Number(age.value) : null;
        if (height.value.trim() || includeNulls) payload.height_cm = height.value.trim() ? Number(height.value) : null;
        if (weight.value.trim() || includeNulls) payload.weight_kg = weight.value.trim() ? Number(weight.value) : null;
        if (sex.value || includeNulls) payload.sex = sex.value || null;
        if (selected.body_shape || includeNulls) payload.body_shape = selected.body_shape || null;
        if (selected.fit_preference || includeNulls) payload.fit_preference = selected.fit_preference || null;
        if (selected.skin_tone || includeNulls) payload.skin_tone = selected.skin_tone || null;
        return payload;
      }

      async function loadProfile() {
        const profile = await apiFetch("/body-profile", { method: "GET" });
        currentProfile = profile;
        userName.value = profile.user_name || "";
        age.value = profile.age ?? "";
        height.value = profile.height_cm ?? "";
        weight.value = profile.weight_kg ?? "";
        sex.value = profile.sex || "";
        selected.body_shape = profile.body_shape || null;
        selected.fit_preference = profile.fit_preference || null;
        selected.skin_tone = profile.skin_tone || null;
      }

      async function saveProfile() {
        const payload = buildDraftPayload(true);
        await apiFetch("/body-profile", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
      }

      function skipCurrentStep() {
        if (step === 1) {
          selected.body_shape = null;
          selected.fit_preference = null;
        } else if (step === 2) {
          selected.skin_tone = null;
        }
        if (step < 3) step += 1;
        updateStepUi();
      }

      backBtn.addEventListener("click", () => {
        if (step > 0) step -= 1;
        updateStepUi();
      });
      nextBtn.addEventListener("click", () => {
        if (step < 3) step += 1;
        updateStepUi();
      });
      skipBtn.addEventListener("click", skipCurrentStep);
      saveBtn.addEventListener("click", async () => {
        try {
          setError("");
          await saveProfile();
          showToast("Profile saved.", "success");
          window.location.href = "/";
        } catch (e) {
          setError(e.message || "Could not save profile.");
        }
      });

      async function initPage() {
        if (!mountAppShell({ activePage: "profile" })) return;
        renderBodyShapeGrid();
        renderFitGrid();
        renderSkinGrid();
        try {
          await loadProfile();
        } catch (_e) {}
        renderBodyShapeGrid();
        renderFitGrid();
        renderSkinGrid();
        updateStepUi();
      }

      initPage();
    </script>
  </body>
</html>
