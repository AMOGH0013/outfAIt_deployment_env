<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Outfit Planner</title>
    <link rel="stylesheet" href="/frontend/style.css" />
    <style>
      .control-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
        gap: 10px;
        align-items: end;
      }
      .outfit-list {
        display: grid;
        gap: 12px;
      }
      .outfit-card {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: linear-gradient(180deg, color-mix(in srgb, var(--surface-2) 76%, transparent), var(--surface));
        padding: 12px;
      }
      .split-view {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .piece {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 8px;
        background: color-mix(in srgb, var(--surface-3) 70%, black);
      }
      .piece img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        border-radius: 8px;
      }
      .why-box {
        margin-top: 10px;
      }
      details summary {
        cursor: pointer;
        font-weight: 700;
      }
      @media (max-width: 980px) {
        .control-grid {
          grid-template-columns: 1fr;
        }
        .split-view {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body class="app-shell">
    <main class="page">
      <header class="page-header">
        <div>
          <h1 class="page-title">Outfit Planner</h1>
          <p class="page-subtitle">Generate complete looks and inspect recommendation reasoning.</p>
        </div>
      </header>

      <section class="panel">
        <div class="control-grid">
          <label>
            Start date
            <input id="startDate" type="date" />
          </label>
          <label>
            Days
            <input id="daysInput" type="number" min="1" max="14" value="7" />
          </label>
          <div class="summary muted small">Generate a fresh set while keeping historical feedback signals.</div>
          <button id="generateBtn" class="btn" type="button">Generate Outfits</button>
        </div>
      </section>

      <section class="panel">
        <div class="row space-between">
          <h2 style="margin:0;">Recommendations</h2>
          <span id="statusText" class="muted small">Waiting for generation...</span>
        </div>
        <div id="emptyState" class="empty-state" style="margin-top:12px;">
          <div class="empty-art">[]</div>
          <strong>No recommendations yet</strong>
          <div class="muted">Generate outfits after scanning at least one top and one bottom.</div>
        </div>
        <div id="outfitList" class="outfit-list hidden" style="margin-top:12px;"></div>
      </section>
    </main>

    <script src="/frontend/app.js?v=10"></script>
    <script>
      const startDate = document.getElementById("startDate");
      const daysInput = document.getElementById("daysInput");
      const generateBtn = document.getElementById("generateBtn");
      const statusText = document.getElementById("statusText");
      const outfitList = document.getElementById("outfitList");
      const emptyState = document.getElementById("emptyState");

      let wardrobeMap = new Map();

      function badgeClassByScore(score) {
        if (score > 0.8) return "compat-good";
        if (score >= 0.6) return "compat-mid";
        return "compat-low";
      }

      async function refreshWardrobeMap() {
        const res = await apiFetch("/wardrobe?include_inactive=true");
        const items = Array.isArray(res.items) ? res.items : [];
        wardrobeMap = new Map(items.map((it) => [String(it.id), it]));
      }

      function resolveItems(itemIds) {
        const items = (itemIds || []).map((id) => wardrobeMap.get(String(id))).filter(Boolean);
        const top = items.find((it) => it.category === "top") || null;
        const bottom = items.find((it) => it.category === "bottom") || null;
        return { top, bottom };
      }

      async function markWorn(outfit) {
        await apiFetch("/outfits/mark-worn", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ outfit_id: outfit.outfit_id, worn_date: outfit.date }),
        });
      }

      function renderOutfitCard(outfit) {
        const { top, bottom } = resolveItems(outfit.item_ids);
        const score = Math.max(0, Math.min(1, Number(outfit.final_score ?? outfit.score ?? 0.7)));
        const reasons = simpleReasonText(outfit.explanation_data);
        const card = document.createElement("article");
        card.className = "outfit-card";

        if (!top || !bottom) {
          card.innerHTML = `<div class="summary muted">Outfit ${outfit.date}: item images unavailable (item may be inactive).</div>`;
          return card;
        }

        card.innerHTML = `
          <div class="row space-between">
            <strong>${outfit.date}</strong>
            <span class="badge ${badgeClassByScore(score)}">Compatibility ${score.toFixed(2)}</span>
          </div>
          <div class="split-view" style="margin-top:10px;">
            <div class="piece">
              <img src="${renderImage(top.image_preview_url || top.image_url)}" alt="Top garment" />
              <div class="row space-between" style="margin-top:8px;">
                <span class="badge top">TOP</span>
                <span class="color-chip"><span class="swatch-dot" style="background:${getColorHex(top.color)}"></span>${top.color || "unknown"}</span>
              </div>
            </div>
            <div class="piece">
              <img src="${renderImage(bottom.image_preview_url || bottom.image_url)}" alt="Bottom garment" />
              <div class="row space-between" style="margin-top:8px;">
                <span class="badge bottom">BOTTOM</span>
                <span class="color-chip"><span class="swatch-dot" style="background:${getColorHex(bottom.color)}"></span>${bottom.color || "unknown"}</span>
              </div>
            </div>
          </div>
          <details class="why-box">
            <summary>Why this outfit?</summary>
            <div class="summary" style="margin-top:8px;">
              <div><strong>Color harmony:</strong> ${reasons.colorReason}</div>
              <div style="margin-top:6px;"><strong>Style match:</strong> ${reasons.styleReason}</div>
            </div>
          </details>
          <div class="row" style="margin-top:10px;">
            <button class="btn small mark-worn-btn" type="button">Mark as Worn</button>
            <span class="muted small">${summarizeExplanation(outfit.explanation_data)}</span>
          </div>
        `;

        const wornBtn = card.querySelector(".mark-worn-btn");
        wornBtn.addEventListener("click", async () => {
          try {
            wornBtn.disabled = true;
            await markWorn(outfit);
            showToast("Marked as worn.", "success");
          } catch (e) {
            showToast(e.message || "Failed to mark worn.", "error");
          } finally {
            wornBtn.disabled = false;
          }
        });
        return card;
      }

      function renderOutfits(outfits) {
        outfitList.innerHTML = "";
        if (!outfits.length) {
          emptyState.classList.remove("hidden");
          outfitList.classList.add("hidden");
          return;
        }
        emptyState.classList.add("hidden");
        outfitList.classList.remove("hidden");
        outfits.forEach((outfit) => outfitList.appendChild(renderOutfitCard(outfit)));
      }

      async function generateOutfits() {
        const start = startDate.value;
        const days = Number(daysInput.value || 7);
        statusText.textContent = "Generating...";
        generateBtn.disabled = true;
        try {
          await refreshWardrobeMap();
          const res = await apiFetch(`/outfits/generate?start_date=${encodeURIComponent(start)}&days=${encodeURIComponent(days)}`, {
            method: "POST",
          });
          const outfits = Array.isArray(res.outfits) ? res.outfits : [];
          renderOutfits(outfits);
          statusText.textContent = `${outfits.length} outfit(s) ready`;
          showToast("Outfits generated successfully.", "success");
        } catch (e) {
          statusText.textContent = "Generation failed";
          const msg = e.message || "Failed to generate outfits.";
          showToast(msg, "error");
          emptyState.classList.remove("hidden");
          outfitList.classList.add("hidden");
          emptyState.innerHTML = `
            <div class="empty-art">[]</div>
            <strong>Could not generate outfits</strong>
            <div class="muted">${msg}</div>
            <a class="btn" href="/frontend/scan.html">Scan More Items</a>
          `;
          renderOutfits([]);
        } finally {
          generateBtn.disabled = false;
        }
      }

      async function initPage() {
        if (!mountAppShell({ activePage: "outfits" })) return;
        startDate.value = fmtDateISO(new Date());
        await refreshWardrobeMap();
      }

      generateBtn.addEventListener("click", generateOutfits);
      initPage();
    </script>
  </body>
</html>
