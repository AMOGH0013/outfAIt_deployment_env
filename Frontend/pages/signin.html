<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>outfAIt - Sign In</title>
    <link rel="stylesheet" href="signin.css">
</head>

<body>
    <div class="container">
        <div class="logo-section">
            <a href="index.html" class="logo-link">
                <img src="logo.png" alt="outfAIt Logo" class="logo-icon">
            </a>

            <h1 class="brand-name">
                <span class="brand-light">outf</span><span class="brand-dark">AI</span><span
                    class="brand-light">t</span>
            </h1>
        </div>

        <div class="login-card">
            <h2 class="login-title">logAIn</h2>

            <form class="login-form" id="loginForm">
                <input type="email" class="input-field" id="email" placeholder="Email Address" required />
                <input type="password" class="input-field" id="password" placeholder="Password" required />

                <div class="error-message" id="errorMessage"></div>

                <button type="submit" class="login-button">LogIn</button>
                <a href="signup.html" class="signup-link">Sign in</a>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            // Validation
            if (!email || !password) {
                errorMessage.textContent = 'Please enter both email and password';
                errorMessage.style.display = 'block';
                return;
            }

            // Login user
            const result = loginUser(email, password);

            if (result.success) {
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                errorMessage.textContent = result.message;
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>

</html>
